<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Cumpleaños, Lorena</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #fdf6ee;
    --blush: #e8b4a0;
    --rose: #c47d6a;
    --deep: #6b3a3a;
    --gold: #c9a96e;
    --dark: #2a1a1a;
  }

  body {
    min-height: 100vh;
    background: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    overflow: hidden;
    position: relative;
  }

  /* Petal rain */
  .petal {
    position: fixed;
    top: -30px;
    width: 10px;
    height: 14px;
    border-radius: 50% 0 50% 0;
    opacity: 0;
    animation: fall linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes fall {
    0%   { transform: translateY(0) rotate(0deg) translateX(0); opacity: 0; }
    10%  { opacity: 0.7; }
    90%  { opacity: 0.5; }
    100% { transform: translateY(110vh) rotate(720deg) translateX(40px); opacity: 0; }
  }

  /* Card */
  .card {
    position: relative;
    z-index: 10;
    width: min(520px, 92vw);
    background: #fff9f4;
    border: 1px solid rgba(201,169,110,0.3);
    padding: 56px 48px 52px;
    box-shadow:
      0 2px 0 rgba(201,169,110,0.4),
      0 8px 40px rgba(107,58,58,0.12),
      0 32px 80px rgba(107,58,58,0.08);
    opacity: 0;
    transform: translateY(30px) scale(0.97);
    animation: appear 1.2s cubic-bezier(0.16,1,0.3,1) 0.4s forwards;
    text-align: center;
  }

  @keyframes appear {
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Corner ornaments */
  .card::before, .card::after {
    content: '';
    position: absolute;
    width: 60px;
    height: 60px;
    border-color: var(--gold);
    border-style: solid;
    opacity: 0.5;
  }
  .card::before { top: 14px; left: 14px; border-width: 1px 0 0 1px; }
  .card::after  { bottom: 14px; right: 14px; border-width: 0 1px 1px 0; }

  .eyebrow {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.28em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 0.8s ease 1.2s forwards;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 0 auto 28px;
    width: 80%;
    opacity: 0;
    animation: fadeUp 0.8s ease 1.4s forwards;
  }
  .divider-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--gold)); }
  .divider-line.right { background: linear-gradient(to left, transparent, var(--gold)); }
  .divider-icon { color: var(--rose); font-size: 14px; }

  .name {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(52px, 13vw, 72px);
    font-weight: 300;
    font-style: italic;
    color: var(--deep);
    line-height: 1;
    letter-spacing: -0.01em;
    margin-bottom: 8px;
    opacity: 0;
    animation: fadeUp 1s ease 1.6s forwards;
  }

  .subtitle {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.22em;
    color: var(--rose);
    margin-bottom: 36px;
    opacity: 0;
    animation: fadeUp 0.8s ease 1.9s forwards;
  }

  .message {
    font-size: 16.5px;
    line-height: 1.85;
    color: #5a3a3a;
    font-weight: 300;
    font-style: italic;
    margin-bottom: 36px;
    opacity: 0;
    animation: fadeUp 0.8s ease 2.1s forwards;
  }

  .closing-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 0 auto 28px;
    width: 60%;
    opacity: 0;
    animation: fadeUp 0.8s ease 2.4s forwards;
  }
  .closing-divider .divider-line { background: linear-gradient(to right, transparent, rgba(201,169,110,0.5)); }
  .closing-divider .divider-line.right { background: linear-gradient(to left, transparent, rgba(201,169,110,0.5)); }

  .signature {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    letter-spacing: 0.18em;
    color: var(--gold);
    font-style: normal;
    opacity: 0;
    animation: fadeUp 0.8s ease 2.5s forwards;
  }

  .hearts {
    margin-top: 30px;
    display: flex;
    justify-content: center;
    gap: 8px;
    opacity: 0;
    animation: fadeUp 0.8s ease 2.7s forwards;
  }

  .heart {
    font-size: 13px;
    animation: pulse 2s ease-in-out infinite;
  }
  .heart:nth-child(2) { animation-delay: 0.3s; font-size: 18px; color: var(--rose); }
  .heart:nth-child(3) { animation-delay: 0.6s; }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.3); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Glow behind card */
  .glow {
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(232,180,160,0.22) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 1;
    animation: breathe 5s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { transform: translate(-50%,-50%) scale(1); opacity: 0.8; }
    50%       { transform: translate(-50%,-50%) scale(1.15); opacity: 1; }
  }
</style>
</head>
<body>

<div class="glow"></div>

<div class="card">
  <p class="eyebrow">Con todo mi amor</p>

  <div class="divider">
    <span class="divider-line"></span>
    <span class="divider-icon">✦</span>
    <span class="divider-line right"></span>
  </div>

  <h1 class="name">Lorena</h1>
  <p class="subtitle">Feliz Cumpleaños</p>

  <p class="message">
    Hoy el mundo celebra el día en que llegaste<br>
    para hacerlo más bonito.<br><br>
    Que este año te traiga todo lo que mereces —<br>
    que es mucho, y tú lo sabes.<br><br>
    Gracias por existir, por sonreír,<br>
    por ser exactamente quien eres.
  </p>

  <div class="closing-divider">
    <span class="divider-line"></span>
    <span class="divider-icon" style="color:var(--gold); font-size:11px;">✦</span>
    <span class="divider-line right"></span>
  </div>

  <p class="signature">Siempre tuyo</p>

  <div class="hearts">
    <span class="heart" style="color:#d4a0a0;">♥</span>
    <span class="heart">♥</span>
    <span class="heart" style="color:#d4a0a0;">♥</span>
  </div>
</div>

<script>
  // Generate petals
  const colors = ['#e8b4a0','#f2c8b8','#d49080','#f5ddd5','#c9a96e'];
  const count = 28;

  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    const size = 6 + Math.random() * 10;
    p.style.cssText = `
      left: ${Math.random() * 100}%;
      width: ${size}px;
      height: ${size * 1.4}px;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      animation-duration: ${5 + Math.random() * 8}s;
      animation-delay: ${Math.random() * 6}s;
      opacity: 0;
      border-radius: ${Math.random() > 0.5 ? '50% 0 50% 0' : '0 50% 0 50%'};
    `;
    document.body.appendChild(p);
  }
</script>
</body>
</html>
